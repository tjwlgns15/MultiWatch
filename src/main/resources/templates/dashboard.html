<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MultiWatch Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.1/echarts.min.js"></script>
    <style>
        :root{
            --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a;
            --text:#e6e8ec; --sub:#8b93a3; --accent:#4f8cff; --danger:#ff5566; --ok:#33d17a;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:-apple-system,'Segoe UI',Pretendard,sans-serif;background:var(--bg);color:var(--text);}

        /* ── 로그인 화면 ── */
        /* ── 대시보드 ── */
        #dashboard{display:none;}
        header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
        header h1{font-size:16px;margin:0;}
        .conn{font-size:12px;color:var(--sub);}
        .conn.on::before{content:'● ';color:var(--ok);}
        .conn.off::before{content:'● ';color:var(--danger);}

        #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;padding:16px 20px;}
        .slot{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .3s, box-shadow .3s;}
        .slot.alert{border-color:var(--danger);box-shadow:0 0 0 1px var(--danger) inset;}
        .slot-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
        .slot-title{font-size:13px;font-weight:600;}
        .slot-sub{font-size:11px;color:var(--sub);}
        .slot-value{font-size:20px;font-weight:700;}
        .chart{height:140px;}
        .slot-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
        .rule-btn{font-size:11px;background:var(--panel2);border:1px solid var(--border);color:var(--sub);padding:4px 8px;border-radius:6px;cursor:pointer;}
        .rule-btn:hover{color:var(--text);}

        /* ── 알림 토스트/패널 ── */
        #alert-panel{position:fixed;right:16px;top:70px;width:300px;max-height:70vh;overflow-y:auto;z-index:50;}
        .toast{background:#3a1c22;border:1px solid var(--danger);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;animation:slide .25s ease-out;}
        .toast b{color:#ffb0b8;}
        @keyframes slide{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

        /* ── 규칙 관리 모달 ── */
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
        .modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:340px;}
        .modal h2{font-size:14px;margin:0 0 12px;}
        .rule-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:8px 0;border-bottom:1px solid var(--border);}
        .rule-row .del{color:var(--danger);cursor:pointer;font-size:11px;}
        .rule-form{display:flex;gap:6px;margin-top:12px;}
        .rule-form select,.rule-form input{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px;font-size:12px;}
        .rule-form input{width:70px;}
        .modal-close{margin-top:14px;width:100%;padding:8px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--sub);cursor:pointer;}
    </style>
</head>
<body>

<!-- 대시보드 -->
<div id="dashboard">
    <header>
        <h1>MultiWatch — 실시간 설비 모니터링</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="conn off" id="conn-badge">연결 끊김</span>
            <button class="rule-btn" onclick="logout()">로그아웃</button>
        </div>
    </header>
    <div id="grid"></div>
</div>

<div id="alert-panel"></div>

<!-- 알림 규칙 모달 -->
<div class="modal-bg" id="rule-modal-bg">
    <div class="modal">
        <h2 id="rule-modal-title">알림 규칙</h2>
        <div id="rule-list"></div>
        <div class="rule-form">
            <select id="rule-comparator">
                <option value="GT">초과 시 (&gt;)</option>
                <option value="LT">미만 시 (&lt;)</option>
            </select>
            <input id="rule-threshold" type="number" step="any" placeholder="임계값" />
            <button class="rule-btn" onclick="createRule()">추가</button>
        </div>
        <button class="modal-close" onclick="closeRuleModal()">닫기</button>
    </div>
</div>

<script>
    const BASE = window.location.origin;
    let organizationId = null;
    let stompClient = null;

    // room-slot 구조: deviceId -> { chart, buffer(head-pointer 큐), series[], lastValue, alertTimer }
    const slots = new Map();
    const MAX_POINTS = 40;
    let currentRuleDeviceId = null;

    // ───────────────────────── 부팅 ─────────────────────────
    // 이 페이지는 DashboardSecurityConfig(@Order(3))를 통과해야만 도달하므로
    // 별도 로그인 화면 없이 바로 데이터를 로드한다.
    // 다만 세션이 중간에 만료될 수 있어(장시간 방치 등), 401을 받으면 로그인 페이지로 되돌려보낸다.
    async function authFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', ...options });
        if (res.status === 401) {
            window.location.href = `/login.html?continue=${encodeURIComponent(window.location.pathname)}`;
            throw new Error('세션 만료 — 로그인 페이지로 이동');
        }
        return res;
    }

    async function bootDashboard() {
        document.getElementById('dashboard').style.display = 'block';

        const me = await authFetch(`${BASE}/api/members/me`).then(r => r.json());
        organizationId = me.organizationId;

        const devices = await authFetch(`${BASE}/api/devices`).then(r => r.json());
        devices.forEach(createSlot);

        connectWebSocket();
        requestAnimationFrame(renderLoop);
    }

    document.addEventListener('DOMContentLoaded', bootDashboard);

    async function logout() {
        await fetch(`${BASE}/api/auth/logout`, { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }

    // ───────────────────────── room-slot 생성 ─────────────────────────
    function createSlot(device) {
        const grid = document.getElementById('grid');
        const el = document.createElement('div');
        el.className = 'slot';
        el.id = `slot-${device.id}`;
        el.innerHTML = `
    <div class="slot-head">
      <span class="slot-title">${escapeHtml(device.name)}</span>
      <span class="slot-sub">${device.deviceType} · ${device.status}</span>
    </div>
    <div class="slot-value" id="value-${device.id}">--</div>
    <div class="chart" id="chart-${device.id}"></div>
    <div class="slot-foot">
      <span class="slot-sub">${escapeHtml(device.deviceKey)}</span>
      <button class="rule-btn" onclick="openRuleModal(${device.id}, '${escapeHtml(device.name)}')">규칙 관리</button>
    </div>
  `;
        grid.appendChild(el);

        const chart = echarts.init(document.getElementById(`chart-${device.id}`));
        chart.setOption({
            grid: { left: 30, right: 10, top: 10, bottom: 20 },
            xAxis: { type: 'category', data: [], axisLabel: { color: '#8b93a3', fontSize: 9 }, axisLine: { lineStyle: { color: '#2a2f3a' } } },
            yAxis: { type: 'value', axisLabel: { color: '#8b93a3', fontSize: 9 }, splitLine: { lineStyle: { color: '#2a2f3a' } } },
            series: [{ type: 'line', data: [], smooth: true, showSymbol: false, lineStyle: { color: '#4f8cff', width: 2 }, areaStyle: { color: 'rgba(79,140,255,0.08)' } }]
        });

        slots.set(device.id, {
            chart,
            labels: [],
            values: [],
            buffer: [],   // head-pointer 큐: WS로 들어온 원시 데이터가 여기 쌓임
            head: 0,      // 아직 렌더링에 반영 안 한 시작 인덱스
            dirty: false
        });
    }

    // ───────────────────────── WebSocket (STOMP over SockJS) ─────────────────────────
    function connectWebSocket() {
        setConn(false, '연결 중...');
        const socket = new SockJS(`${BASE}/ws/dashboard`);
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, () => {
            setConn(true, '연결됨');
            stompClient.subscribe(`/topic/org/${organizationId}/readings`, onReading);
            stompClient.subscribe(`/topic/org/${organizationId}/alerts`, onAlert);
        }, () => {
            setConn(false, '재연결 시도 중...');
            setTimeout(connectWebSocket, 3000);
        });
    }

    function setConn(on, text) {
        const el = document.getElementById('conn-badge');
        el.className = 'conn ' + (on ? 'on' : 'off');
        el.textContent = text;
    }

    // WS 콜백은 큐에 push만 하고 끝난다 — 실제 차트 갱신은 renderLoop가 담당
    function onReading(msg) {
        const payload = JSON.parse(msg.body);
        const slot = slots.get(payload.deviceId);
        if (!slot) return;
        slot.buffer.push(payload);
        slot.dirty = true;
    }

    function onAlert(msg) {
        const payload = JSON.parse(msg.body);
        flashSlot(payload.deviceId);
        pushToast(payload);
    }

    // ───────────────────────── Global RAF 루프 ─────────────────────────
    // 메시지가 올 때마다 setOption을 부르면 렌더링이 밀리므로,
    // 프레임당 한 번씩 head 이후로 쌓인 데이터만 모아서 반영한다.
    function renderLoop() {
        slots.forEach((slot, deviceId) => {
            if (!slot.dirty) return;

            const newItems = slot.buffer.slice(slot.head);
            slot.head = slot.buffer.length;
            slot.dirty = false;
            if (newItems.length === 0) return;

            newItems.forEach(item => {
                slot.labels.push(new Date(item.recordedAt).toLocaleTimeString('ko-KR', { hour12: false }));
                slot.values.push(item.value);
            });
            if (slot.labels.length > MAX_POINTS) {
                const overflow = slot.labels.length - MAX_POINTS;
                slot.labels.splice(0, overflow);
                slot.values.splice(0, overflow);
            }

            slot.chart.setOption({
                xAxis: { data: slot.labels },
                series: [{ data: slot.values }]
            });

            const last = newItems[newItems.length - 1];
            const valueEl = document.getElementById(`value-${deviceId}`);
            if (valueEl) valueEl.textContent = last.value.toFixed(2);

            // 버퍼가 무한히 커지지 않도록 head 기준으로 주기적 정리
            if (slot.head > 500) {
                slot.buffer = slot.buffer.slice(slot.head);
                slot.head = 0;
            }
        });

        requestAnimationFrame(renderLoop);
    }

    function flashSlot(deviceId) {
        const el = document.getElementById(`slot-${deviceId}`);
        if (!el) return;
        el.classList.add('alert');
        clearTimeout(el._alertTimer);
        el._alertTimer = setTimeout(() => el.classList.remove('alert'), 2500);
    }

    function pushToast(payload) {
        const panel = document.getElementById('alert-panel');
        const div = document.createElement('div');
        div.className = 'toast';
        const time = new Date(payload.triggeredAt).toLocaleTimeString('ko-KR', { hour12: false });
        div.innerHTML = `<b>알림 발생</b> · deviceId ${payload.deviceId}<br>값: ${payload.triggeredValue} · ${time}`;
        panel.prepend(div);
        setTimeout(() => div.remove(), 8000);
        while (panel.children.length > 8) panel.removeChild(panel.lastChild);
    }

    // ───────────────────────── 알림 규칙 관리 모달 ─────────────────────────
    async function openRuleModal(deviceId, deviceName) {
        currentRuleDeviceId = deviceId;
        document.getElementById('rule-modal-title').textContent = `알림 규칙 — ${deviceName}`;
        document.getElementById('rule-modal-bg').style.display = 'flex';
        await loadRules();
    }

    function closeRuleModal() {
        document.getElementById('rule-modal-bg').style.display = 'none';
        currentRuleDeviceId = null;
    }

    async function loadRules() {
        const rules = await authFetch(`${BASE}/api/alert-rules?deviceId=${currentRuleDeviceId}`).then(r => r.json());
        const list = document.getElementById('rule-list');
        if (!rules.length) {
            list.innerHTML = '<div class="slot-sub">등록된 규칙이 없습니다</div>';
            return;
        }
        list.innerHTML = rules.map(r => `
    <div class="rule-row">
      <span>${r.comparator === 'GT' ? '초과' : '미만'} ${r.thresholdValue} ${r.enabled ? '' : '(비활성)'}</span>
      ${r.enabled ? `<span class="del" onclick="disableRule(${r.id})">비활성화</span>` : ''}
    </div>
  `).join('');
    }

    async function createRule() {
        const comparator = document.getElementById('rule-comparator').value;
        const thresholdValue = parseFloat(document.getElementById('rule-threshold').value);
        if (isNaN(thresholdValue)) return;

        await authFetch(`${BASE}/api/alert-rules`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ deviceId: currentRuleDeviceId, thresholdValue, comparator })
        });
        document.getElementById('rule-threshold').value = '';
        await loadRules();
    }

    async function disableRule(ruleId) {
        await authFetch(`${BASE}/api/alert-rules/${ruleId}`, { method: 'DELETE' });
        await loadRules();
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
</script>
</body>
</html>
